<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/sahil_favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sahil Patil | AI & ML Engineer</title>
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Preload heavily used fonts -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;600;700;800&display=swap">
    </noscript>

  </head>
  <body class="bg-dark text-slate-200 antialiased overflow-x-hidden w-full min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Noise Grain Filter -->
    <svg style="display:none;">
      <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      </filter>
    </svg>
    <div id="noise" class="pointer-events-none fixed inset-0 w-full h-full opacity-[0.03] z-[9999] mix-blend-overlay" style="filter: url(#noiseFilter);"></div>
  </body>
</html>
